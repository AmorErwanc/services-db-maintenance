name: CI

on:
  push:
    branches:
      - main
      - deploy/prod
  pull_request:

permissions:
  contents: read

jobs:
  校验脚本:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Bash 语法检查
        run: bash -n scripts/*.sh deploy/*.sh
      - name: 敏感配置保护检查
        run: test ! -e mysql.cnf
